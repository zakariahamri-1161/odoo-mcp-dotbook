worker_processes 1;

events {
    worker_connections 256;
}

http {
    # Upstream connection pool to the dev Odoo container (reached via the
    # host port mapping, since the dev Odoo lives in a separate compose).
    upstream odoo {
        server host.docker.internal:8070;
        keepalive 8;
    }

    # Client-facing keepalive — this is what makes nginx behave like a real
    # LB from the client's perspective. Werkzeug + --dev=all ALWAYS sends
    # Connection: close, but nginx terminates the keepalive boundary at its
    # client side and rewrites the connection lifecycle. Without this layer,
    # the client never holds a keepalive socket and #68's half-open scenario
    # cannot be reproduced locally.
    keepalive_timeout 300s;
    keepalive_requests 10000;

    # Quiet down the access log unless we explicitly need it for debugging.
    access_log /dev/null;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;

        location / {
            proxy_pass http://odoo;
            proxy_http_version 1.1;

            # Empty Connection header tells nginx to use the upstream keepalive
            # pool instead of opening a fresh socket per request.
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
